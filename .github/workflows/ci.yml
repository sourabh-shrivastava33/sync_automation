name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  build_and_test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [20.x]

    steps:
      - uses: actions/checkout@v3

      - name: Install pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 8

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v3
        with:
          node-version: ${{ matrix.node-version }}
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install

      - name: Run Audit
        run: npm audit --audit-level=high

      - name: Typecheck
        run: pnpm run build --filter=...^build

      - name: Lint
        run: pnpm run lint

      - name: Test (Unit + Integration)
        run: pnpm test -- --coverage

      - name: Enforce Coverage
        run: |
          COVERAGE=$(npx jest --coverage --coverageReporters="text-summary" | grep "All files" | awk '{print $4}' | sed 's/%//')
          if [ $(echo "$COVERAGE < 85" | bc) -eq 1 ]; then
            echo "Test coverage ($COVERAGE%) is below 85%"
            exit 1
          fi

      - name: Build
        run: pnpm run build

      - name: Install Playwright Browsers
        run: pnpm exec playwright install --with-deps

      - name: Run E2E Tests (Playwright + Axe)
        run: pnpm exec playwright test

      - name: Run Lighthouse
        run: npm install -g @lhci/cli && lhci autorun
